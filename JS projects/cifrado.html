<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cifrado César y Vigenère</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background: #f0f2f5;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 400px;
      margin: auto;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    input, select, button, textarea {
      margin: 10px;
      padding: 8px;
      width: 90%;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      cursor: pointer;
      background: #2196F3;
      color: white;
      border: none;
    }
    button:hover {
      background: #1a7bca;
    }
    textarea {
      height: 100px;
      resize: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Cifrado César y Vigenère</h2>

    <label>Texto:</label>
    <input type="text" id="texto" placeholder="Ingresa el texto">

    <label>Método:</label>
    <select id="metodo" onchange="cambiarClave()">
      <option value="cesar">César</option>
      <option value="vigenere">Vigenère</option>
    </select>

    <label id="claveLabel">Clave (número para César):</label>
    <input type="text" id="clave" placeholder="Ej: 3 o CLAVE">

    <button onclick="procesar('encriptar')">Encriptar</button>
    <button onclick="procesar('desencriptar')">Desencriptar</button>

    <h3>Resultado:</h3>
    <textarea id="resultado" readonly></textarea>
  </div>

  <script>
    function limpiarTexto(texto) {
      return texto.toUpperCase().replace(/[^A-Z]/g, "");
    }

    function cesar(texto, clave, encriptar = true) {
      texto = limpiarTexto(texto);
      let resultado = "";
      for (let c of texto) {
        let pos = c.charCodeAt(0) - 65;
        if (encriptar) {
          pos = (pos + clave) % 26;
        } else {
          pos = (pos - clave + 26) % 26;
        }
        resultado += String.fromCharCode(65 + pos);
      }
      return resultado;
    }

    function generarClave(texto, clave) {
      clave = limpiarTexto(clave);
      let extendida = "";
      for (let i = 0; i < texto.length; i++) {
        extendida += clave[i % clave.length];
      }
      return extendida;
    }

    function vigenere(texto, clave, encriptar = true) {
      texto = limpiarTexto(texto);
      let claveExt = generarClave(texto, clave);
      let resultado = "";

      for (let i = 0; i < texto.length; i++) {
        let t = texto.charCodeAt(i) - 65;
        let k = claveExt.charCodeAt(i) - 65;
        let pos;
        if (encriptar) {
          pos = (t + k) % 26;
        } else {
          pos = (t - k + 26) % 26;
        }
        resultado += String.fromCharCode(65 + pos);
      }
      return resultado;
    }

    function procesar(accion) {
      let texto = document.getElementById("texto").value;
      let metodo = document.getElementById("metodo").value;
      let clave = document.getElementById("clave").value;
      let resultado = "";

      if (metodo === "cesar") {
        if (isNaN(clave)) {
          alert("La clave debe ser un número para César");
          return;
        }
        let desplazamiento = parseInt(clave);
        resultado = cesar(texto, desplazamiento, accion === "encriptar");
      } else {
        if (clave.trim() === "") {
          alert("La clave no puede estar vacía para Vigenère");
          return;
        }
        resultado = vigenere(texto, clave, accion === "encriptar");
      }

      document.getElementById("resultado").value = resultado;
    }

    function cambiarClave() {
      let metodo = document.getElementById("metodo").value;
      let label = document.getElementById("claveLabel");
      if (metodo === "cesar") {
        label.innerText = "Clave (número para César):";
      } else {
        label.innerText = "Clave (palabra para Vigenère):";
      }
    }
  </script>
</body>
</html>
